<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Title</title>
  <style>
    * {
      margin: 0;
    }
    .wrapper{
      display: grid;
      height: 100vh;
      background-color: gray;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: 1fr 2fr 1fr;
      grid-column-gap: 10px;
    }
    .item{
      background-color: lightgray;
      border: 1px solid black;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .wrapper div:nth-child(5){
      background-color: red;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="item">
      <p>Lorem ipsum dolor.</p>
    </div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
  </div>
</body>
</html>
