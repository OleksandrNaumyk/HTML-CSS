<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Title</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<form class="form-registration">
    <div class="registration">
        <div class="up">
            <h1>Вхід в особистий кабінет</h1>
        </div>
        <div class="down">
            <input type="text" placeholder="Логін або email" class="input-login">
            <input type="password" placeholder="Пароль" class="input-password"SIZE="">
            <div class="done">
                <div>
                <label for="memory">
                    <input type="checkbox" id="memory">Запамятати мене
                </label>
                </div>
                <div>
                <input type="submit" value="Вхід" class="button-login">
                </div>
            </div>
        </div>
    </div>
</form>
</body>
</html>
